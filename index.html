<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snippet Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"] {
    --bg-base: #080b14;
    --bg-layer: #0d1120;
    --bg-card: rgba(255,255,255,0.04);
    --bg-card-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border-bright: rgba(255,255,255,0.18);
    --text-primary: #f0f4ff;
    --text-secondary: #7a8aaa;
    --text-muted: #3d4a62;
    --accent: #5b8dee;
    --accent-glow: rgba(91,141,238,0.35);
    --accent2: #c084fc;
    --accent2-glow: rgba(192,132,252,0.25);
    --green: #34d399;
    --green-glow: rgba(52,211,153,0.3);
    --red: #f87171;
    --red-glow: rgba(248,113,113,0.3);
    --pre-bg: rgba(0,0,0,0.35);
    --noise: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    --orb1: rgba(91,141,238,0.12);
    --orb2: rgba(192,132,252,0.09);
    --toggle-bg: rgba(255,255,255,0.06);
  }
  :root[data-theme="light"] {
    --bg-base: #f0f2f9;
    --bg-layer: #e8ecf7;
    --bg-card: rgba(255,255,255,0.65);
    --bg-card-hover: rgba(255,255,255,0.85);
    --border: rgba(0,0,0,0.07);
    --border-bright: rgba(0,0,0,0.15);
    --text-primary: #0f172a;
    --text-secondary: #475569;
    --text-muted: #94a3b8;
    --accent: #3b6fd4;
    --accent-glow: rgba(59,111,212,0.2);
    --accent2: #9333ea;
    --accent2-glow: rgba(147,51,234,0.15);
    --green: #059669;
    --green-glow: rgba(5,150,105,0.2);
    --red: #dc2626;
    --red-glow: rgba(220,38,38,0.2);
    --pre-bg: rgba(0,0,0,0.05);
    --noise: none;
    --orb1: rgba(59,111,212,0.07);
    --orb2: rgba(147,51,234,0.06);
    --toggle-bg: rgba(0,0,0,0.06);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background-color: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background-color 0.4s, color 0.4s;
  }

  /* Animated background */
  .bg-scene {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    animation: drift 18s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 600px; height: 600px;
    top: -200px; left: -200px;
    background: var(--orb1);
    animation-duration: 20s;
  }
  .orb-2 {
    width: 500px; height: 500px;
    bottom: -150px; right: -100px;
    background: var(--orb2);
    animation-duration: 15s;
    animation-direction: alternate-reverse;
  }
  .orb-3 {
    width: 300px; height: 300px;
    top: 40%; left: 50%;
    background: var(--accent-glow);
    animation-duration: 25s;
  }
  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to { transform: translate(60px, 40px) scale(1.15); }
  }

  .noise-overlay {
    position: fixed; inset: 0; z-index: 1;
    background-image: var(--noise);
    background-size: 150px;
    pointer-events: none;
    opacity: 1;
  }

  /* Layout */
  .container {
    position: relative; z-index: 2;
    max-width: 1000px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* Header */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 48px;
    animation: fadeDown 0.7s ease both;
  }
  .header-left {}
  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .eyebrow::before {
    content: '';
    width: 24px; height: 1px;
    background: var(--accent);
    display: inline-block;
  }
  h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--text-primary) 40%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin-top: 8px;
    font-weight: 400;
  }
  .snippet-count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 6px;
  }
  #count-num {
    color: var(--accent);
    font-weight: 700;
  }

  /* Theme toggle */
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--toggle-bg);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(12px);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
    flex-shrink: 0;
    margin-top: 8px;
  }
  .theme-toggle:hover {
    border-color: var(--border-bright);
    color: var(--text-primary);
    background: var(--bg-card-hover);
  }
  .toggle-icon { font-size: 14px; transition: transform 0.4s; }
  .theme-toggle:hover .toggle-icon { transform: rotate(20deg); }

  /* Glass card */
  .glass-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: all 0.3s;
  }
  .glass-card:hover {
    border-color: var(--border-bright);
    background: var(--bg-card-hover);
  }

  /* Add snippet form */
  .add-form {
    padding: 28px;
    margin-bottom: 24px;
    animation: fadeUp 0.7s 0.1s ease both;
  }
  .form-title {
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 18px;
  }
  .input-group { margin-bottom: 14px; }
  .input-label {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    display: block;
  }
  input[type="text"], textarea {
    width: 100%;
    background: rgba(0,0,0,0.15);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    resize: none;
  }
  [data-theme="light"] input[type="text"],
  [data-theme="light"] textarea {
    background: rgba(255,255,255,0.6);
  }
  input[type="text"]:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    background: rgba(0,0,0,0.22);
  }
  [data-theme="light"] input[type="text"]:focus,
  [data-theme="light"] textarea:focus {
    background: rgba(255,255,255,0.9);
  }
  input::placeholder, textarea::placeholder { color: var(--text-muted); }
  textarea { height: 110px; font-family: 'Space Mono', monospace; font-size: 13px; }

  .form-row {
    display: flex;
    gap: 10px;
    margin-top: 18px;
    align-items: center;
  }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 10px 20px;
    border-radius: 100px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(12px);
    white-space: nowrap;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .btn:hover::before { opacity: 1; }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: 0 4px 20px var(--accent-glow), 0 0 0 1px rgba(255,255,255,0.1) inset;
  }
  .btn-primary:hover {
    box-shadow: 0 6px 28px var(--accent-glow), 0 0 0 1px rgba(255,255,255,0.15) inset;
    transform: translateY(-1px);
  }
  .btn-ghost {
    background: var(--bg-card);
    color: var(--text-secondary);
    border-color: var(--border);
  }
  .btn-ghost:hover {
    border-color: var(--border-bright);
    color: var(--text-primary);
    background: var(--bg-card-hover);
  }
  .btn-copy {
    background: rgba(52,211,153,0.1);
    color: var(--green);
    border-color: rgba(52,211,153,0.2);
    padding: 7px 14px;
    font-size: 11px;
  }
  .btn-copy:hover {
    background: rgba(52,211,153,0.18);
    border-color: rgba(52,211,153,0.4);
    box-shadow: 0 4px 16px var(--green-glow);
    transform: translateY(-1px);
  }
  [data-theme="light"] .btn-copy {
    background: rgba(5,150,105,0.08);
    color: var(--green);
    border-color: rgba(5,150,105,0.2);
  }
  .btn-delete {
    background: rgba(248,113,113,0.08);
    color: var(--red);
    border-color: rgba(248,113,113,0.15);
    padding: 7px 14px;
    font-size: 11px;
  }
  .btn-delete:hover {
    background: rgba(248,113,113,0.16);
    border-color: rgba(248,113,113,0.35);
    box-shadow: 0 4px 16px var(--red-glow);
    transform: translateY(-1px);
  }
  [data-theme="light"] .btn-delete {
    background: rgba(220,38,38,0.06);
    color: var(--red);
    border-color: rgba(220,38,38,0.15);
  }

  /* Search */
  .search-wrapper {
    position: relative;
    margin-bottom: 28px;
    animation: fadeUp 0.7s 0.2s ease both;
  }
  .search-icon {
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 15px;
    pointer-events: none;
  }
  #search {
    padding-left: 46px;
    padding-right: 20px;
    border-radius: 100px;
    font-size: 14px;
    background: var(--bg-card);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
  }
  [data-theme="light"] #search {
    background: rgba(255,255,255,0.7);
  }
  #search:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
    background: var(--bg-card-hover);
  }

  /* Snippet grid */
  #snippetList {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 16px;
    animation: fadeUp 0.7s 0.3s ease both;
  }
  @media (max-width: 500px) {
    #snippetList { grid-template-columns: 1fr; }
  }

  /* Snippet card */
  .snippet-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 18px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 22px;
    transition: all 0.3s;
    animation: cardIn 0.4s ease both;
    position: relative;
    overflow: hidden;
  }
  .snippet-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  }
  [data-theme="light"] .snippet-card::before {
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
  }
  .snippet-card:hover {
    border-color: var(--border-bright);
    background: var(--bg-card-hover);
    transform: translateY(-3px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.2);
  }
  [data-theme="light"] .snippet-card:hover {
    box-shadow: 0 16px 48px rgba(0,0,0,0.08);
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
  }
  .snippet-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.3;
  }
  .card-index {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    background: var(--pre-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  pre {
    background: var(--pre-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    line-height: 1.7;
    color: var(--text-secondary);
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 180px;
    overflow-y: auto;
    margin-bottom: 14px;
    scrollbar-width: thin;
    scrollbar-color: var(--text-muted) transparent;
  }
  pre::-webkit-scrollbar { width: 4px; height: 4px; }
  pre::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 4px; }

  .card-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  /* Empty state */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 40px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
  }
  .empty-icon {
    font-size: 40px;
    margin-bottom: 16px;
    display: block;
    opacity: 0.4;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-card);
    border: 1px solid var(--border-bright);
    backdrop-filter: blur(20px);
    color: var(--text-primary);
    padding: 12px 24px;
    border-radius: 100px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    z-index: 999;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast-dot {
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--green-glow);
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
</style>
</head>
<body>

<div class="bg-scene">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="noise-overlay"></div>

<div class="container">

  <header>
    <div class="header-left">
      <div class="eyebrow">Developer Tool</div>
      <h1>Snippet Manager</h1>
      <p class="subtitle">Collect, search, and reuse your best code.</p>
      <p class="snippet-count"><span id="count-num">0</span> snippets saved</p>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
      <span class="toggle-icon" id="themeIcon">🌙</span>
      <span id="themeLabel">Light</span>
    </button>
  </header>

  <!-- Add form -->
  <div class="glass-card add-form">
    <div class="form-title">// New Snippet</div>
    <div class="input-group">
      <label class="input-label" for="title">Title</label>
      <input type="text" id="title" placeholder="e.g. Debounce function, API fetch wrapper…">
    </div>
    <div class="input-group">
      <label class="input-label" for="code">Code</label>
      <textarea id="code" placeholder="Paste your code here…"></textarea>
    </div>
    <div class="form-row">
      <button class="btn btn-primary" onclick="addSnippet()">
        <span>+</span> Add Snippet
      </button>
      <button class="btn btn-ghost" onclick="clearForm()">Clear</button>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrapper">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search snippets by title…" oninput="renderSnippets()">
  </div>

  <!-- Snippets grid -->
  <div id="snippetList"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toastMsg">Copied to clipboard!</span>
</div>

<script>
  let snippets = JSON.parse(localStorage.getItem("snippets")) || [];

  function addSnippet() {
    const title = document.getElementById("title").value.trim();
    const code = document.getElementById("code").value.trim();
    if (!title || !code) {
      showToast("⚠️ Title and code are required", true);
      return;
    }
    snippets.push({ title, code, ts: Date.now() });
    save();
    clearForm();
    renderSnippets();
    showToast("Snippet saved!");
  }

  function clearForm() {
    document.getElementById("title").value = "";
    document.getElementById("code").value = "";
  }

  function save() {
    localStorage.setItem("snippets", JSON.stringify(snippets));
  }

  function renderSnippets() {
    const search = document.getElementById("search").value.toLowerCase();
    const container = document.getElementById("snippetList");
    const filtered = snippets.filter(s => s.title.toLowerCase().includes(search));

    document.getElementById("count-num").textContent = snippets.length;

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <span class="empty-icon">{ }</span>
          ${search ? "No snippets match your search." : "No snippets yet. Add your first one above."}
        </div>`;
      return;
    }

    container.innerHTML = "";
    filtered.forEach((snippet, i) => {
      const realIndex = snippets.indexOf(snippet);
      const div = document.createElement("div");
      div.className = "snippet-card";
      div.style.animationDelay = `${i * 0.06}s`;
      div.innerHTML = `
        <div class="card-header">
          <div class="snippet-title">${escapeHtml(snippet.title)}</div>
          <span class="card-index">#${String(realIndex + 1).padStart(2, '0')}</span>
        </div>
        <pre>${escapeHtml(snippet.code)}</pre>
        <div class="card-actions">
          <button class="btn btn-copy" onclick="copyCode(${realIndex})">⎘ Copy</button>
          <button class="btn btn-delete" onclick="deleteSnippet(${realIndex})">✕ Delete</button>
        </div>`;
      container.appendChild(div);
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function copyCode(index) {
    navigator.clipboard.writeText(snippets[index].code)
      .then(() => showToast("Copied to clipboard!"))
      .catch(() => showToast("Copy failed", true));
  }

  function deleteSnippet(index) {
    snippets.splice(index, 1);
    save();
    renderSnippets();
    showToast("Snippet deleted");
  }

  let toastTimer;
  function showToast(msg, isError = false) {
    const toast = document.getElementById("toast");
    const toastMsg = document.getElementById("toastMsg");
    const dot = toast.querySelector(".toast-dot");
    toastMsg.textContent = msg;
    dot.style.background = isError ? "var(--red)" : "var(--green)";
    dot.style.boxShadow = isError ? "0 0 8px var(--red-glow)" : "0 0 8px var(--green-glow)";
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
  }

  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute("data-theme") === "dark";
    html.setAttribute("data-theme", isDark ? "light" : "dark");
    document.getElementById("themeIcon").textContent = isDark ? "☀️" : "🌙";
    document.getElementById("themeLabel").textContent = isDark ? "Dark" : "Light";
    localStorage.setItem("theme", isDark ? "light" : "dark");
  }

  // Init theme
  const savedTheme = localStorage.getItem("theme") || "dark";
  document.documentElement.setAttribute("data-theme", savedTheme);
  if (savedTheme === "light") {
    document.getElementById("themeIcon").textContent = "☀️";
    document.getElementById("themeLabel").textContent = "Dark";
  }

  renderSnippets();
</script>
</body>
</html>

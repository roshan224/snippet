<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snippet Manager</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen p-8">

<h1 class="text-3xl font-bold mb-6">Developer Snippet Manager</h1>

<div class="bg-white p-6 rounded shadow mb-6">
<input id="title" placeholder="Snippet title"
class="border p-2 w-full mb-2">

<textarea id="code" placeholder="Paste code here"
class="border p-2 w-full mb-2"></textarea>

<button onclick="addSnippet()"
class="bg-blue-500 text-white px-4 py-2 rounded">
Add Snippet
</button>
</div>

<input id="search" placeholder="Search snippets..."
onkeyup="renderSnippets()"
class="border p-2 w-full mb-4">

<div id="snippetList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

<script src="app.js"></script>

</body>
</html>
